# 工具链与命令统一收口到 mise（版本锁死，命令走 task）
[tools]
node = "24.16.0"
pnpm = "11.9.0"

[tasks.install]
description = "安装/更新项目全部依赖"
run = "pnpm install"

[tasks.run]
description = "启动开发服务器（唯一需要启动的组件）"
run = "pnpm vite"

[tasks.build]
description = "类型检查 + 生产构建"
run = "pnpm vue-tsc -b && pnpm vite build"

[tasks.preview]
description = "本地预览生产构建产物"
run = "pnpm vite preview"

[tasks.typecheck]
description = "仅做 TypeScript / 模板类型检查"
run = "pnpm vue-tsc -b"

[tasks.lint]
description = "ESLint 代码检查（CI 门禁用，不自动改写；本地修复加 --fix）"
run = "pnpm eslint ."

[tasks.image]
description = "构建生产镜像（多阶段：mise 构建 dist + nginx 托管）"
# 不设 dir：默认在仓库根（mise.toml 所在地）运行，末尾 . 即根 context
run = "docker build -t mint-ai-club:local ."

[tasks.up]
description = "拉起部署容器（docker compose，后台运行，nginx 暴露 80）"
run = "docker compose up -d"

[tasks.down]
description = "停止并移除部署容器"
run = "docker compose down"

[tasks.release]
description = "发版：改版本号→提交→打tag→推送（参数：<版本号> [本次更新说明]）"
usage = '''
arg "<version>" help="版本号，如 0.2.0"
arg "[notes]" help="本次更新说明（可选；给了就打 annotated tag，让重点在 Release 置顶）"
'''
# tag 推到 GitHub 后由 release.yml 构建推镜像并创建 GitHub Release
run = '''
#!/usr/bin/env bash
set -euo pipefail

VERSION="${usage_version#v}"          # 去掉可能误带的 v 前缀
NOTES="${usage_notes:-}"
TAG="v${VERSION}"

[ -z "$(git status --porcelain)" ] || { echo "工作区有未提交改动，请先处理后再发版。" >&2; exit 1; }
! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null || { echo "tag ${TAG} 已存在。" >&2; exit 1; }

npm version "$VERSION" --no-git-tag-version --allow-same-version >/dev/null
# 版本号有变化才提交；与当前一致（如首发）则直接对 HEAD 打 tag
if [ -n "$(git status --porcelain)" ]; then
  git add package.json && git commit -m "chore: release ${TAG}"
fi

if [ -n "$NOTES" ]; then git tag -a "$TAG" -m "$NOTES"; else git tag "$TAG"; fi
git push origin HEAD && git push origin "$TAG"
echo "已发版 ${TAG}，GitHub Actions 将构建推送镜像并创建 GitHub Release。"
'''
