name: Image

# 镜像发布：tag vX.Y.Z 触发，构建并推送到 GHCR。
# 推送到 main 永不触发；保留 workflow_dispatch 作为手动逃生口（紧急重推 / 回滚验证）。
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # 门禁内置到发版：lint/build 不过则不构建、不推送（直推 main 场景的稳妥兜底）
  quality:
    name: Quality
    uses: ./.github/workflows/quality.yml

  build-push:
    name: Build & Push
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 私有部署型（amd64）：不上 QEMU，但保留 Buildx 以用 gha 层缓存
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # 单组件仓：type=semver 默认剥掉 v 前缀（vX.Y.Z -> X.Y.Z）
          tags: |
            type=semver,pattern={{version}}
            type=sha,enable=${{ github.ref_type != 'tag' }}
          # latest=auto：仅非预发布版本才追加 latest
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
