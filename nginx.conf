server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 带内容 hash 的构建产物，可长期强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control public,immutable;
        try_files $uri =404;
    }

    # SPA history 模式：未命中的路径回退到 index.html，交给 Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
